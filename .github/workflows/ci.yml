name: QAI-Chain CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff mypy

      - name: Lint
        run: ruff check .

      - name: Type check
        run: mypy ai core crypto network quantum scripts tests zk

      - name: Run tests
        run: python -m pytest -q

      - name: Run healthcheck
        run: python scripts/healthcheck.py

      - name: Generate benchmark artifacts
        run: python scripts/generate_benchmark_report.py